<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOL Waitlist - Share eat!</title>
  <style>
    :root {
      --bg-color: #faf9f5;
      --text-color: #1a1a1a;
      --primary: #f5c842;
      --font-heading: Georgia, serif;
      --font-body: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    h1, h2, h3 {
      font-family: var(--font-heading);
      font-weight: 700;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .max-w-2xl {
      max-width: 600px;
      margin: 0 auto;
    }

    .py-12 {
      padding: 48px 0;
    }

    .mb-6 {
      margin-bottom: 24px;
    }

    .mb-8 {
      margin-bottom: 32px;
    }

    .text-4xl {
      font-size: 2.25rem;
    }

    .text-lg {
      font-size: 1.125rem;
    }

    .text-gray-600 {
      color: #666;
    }

    .bg-white {
      background-color: #fff;
    }

    .rounded {
      border-radius: 0.375rem;
    }

    .rounded-lg {
      border-radius: 0.5rem;
    }

    .shadow-md {
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .p-8 {
      padding: 32px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    form div {
      display: flex;
      flex-direction: column;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 0.375rem;
      padding: 8px 16px;
      font-size: 1rem;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(245, 200, 66, 0.1);
    }

    button {
      width: 100%;
      background-color: var(--primary);
      color: #000;
      font-weight: 600;
      padding: 12px 0;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #f5b827;
    }

    .text-center {
      text-align: center;
    }

    .mt-6 {
      margin-top: 24px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .text-yellow-600 {
      color: #ca8a04;
    }

    .text-yellow-600:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container py-12">
    <div class="max-w-2xl">
      <h1 class="text-4xl mb-6">KOL Waitlist</h1>
      <p class="text-lg text-gray-600 mb-8">
        Join our KOL (Key Opinion Leader) program and be part of the Share eat! community.
      </p>
      
      <div class="bg-white rounded-lg shadow-md p-8">
        <form>
          <div>
            <label>Name</label>
            <input type="text" placeholder="Your name">
          </div>
          <div>
            <label>Email</label>
            <input type="email" placeholder="your@email.com">
          </div>
          <div>
            <label>Social Media Handle</label>
            <input type="text" placeholder="@yourhandle">
          </div>
          <button type="submit">Join KOL Waitlist</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
